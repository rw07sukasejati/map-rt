<!DOCTYPE html>
<html>
<head>
<title>Map RT</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
#map{
height:100vh;
}
</style>
</head>

<body>

<div id="map"></div>

<script>
var map = L.map('map').setView([-6.23,106.55],18);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  maxZoom:20
}).addTo(map);

var markers = [];

fetch("LINK_CSV_SHEET")
.then(res => res.text())
.then(csv => {

  let rows = csv.split("\n").slice(1);

  rows.forEach(r => {
    if(r.trim() === "") return; // skip baris kosong

    let col = r.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
    if(!col) return;

    let rumah = col[0].replace(/"/g,'');
    let penghuni = col[1].replace(/"/g,'');
    let lat = parseFloat(col[2]);
    let lng = parseFloat(col[3]);

    if(!isNaN(lat) && !isNaN(lng)){
      let marker = L.marker([lat,lng])
        .addTo(map)
        .bindPopup("<b>Rumah "+rumah+"</b><br>Penghuni: "+penghuni);
      markers.push(marker);
    }
  });

  if(markers.length > 0){
    var group = new L.featureGroup(markers);
    map.fitBounds(group.getBounds());
  }

});
</script>
  
</body>
</html>
