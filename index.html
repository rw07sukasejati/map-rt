<!DOCTYPE html>
<html>
<head>
<title>Map RT</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
#map{
height:100vh;
}
</style>
</head>

<body>

<div id="map"></div>

<script>

var map = L.map('map').setView([-6.23,106.55],18);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:20
}).addTo(map);

var markers = [];

fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vQAmVPDHmQinF7vfKARvQ-cessl32qBxNc-Wl7hULAiZgX7sUIb0smES2hBBQqxz4ulQh-7bbtsGmd1/pub?output=csv")
.then(res => res.text())
.then(csv => {

let rows = csv.split("\n").slice(1);

rows.forEach(r=>{

let col = r.split(",");

let rumah = col[0];
let penghuni = col[1];
let lat = parseFloat(col[2]);
let lng = parseFloat(col[3]);

if(!isNaN(lat) && !isNaN(lng)){

let marker = L.marker([lat,lng])
.addTo(map)
.bindPopup(
"<b>Rumah "+rumah+"</b><br>Penghuni: "+penghuni
);

markers.push(marker);

}

});

var group = new L.featureGroup(markers);
map.fitBounds(group.getBounds());

});

</script>
</body>
</html>
