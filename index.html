<!DOCTYPE html>
<html>
<head>
<title>Map RT</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
#map{
  height:100vh;
}
</style>
</head>

<body>

<div id="map"></div>

<script>
var map = L.map('map'); // setView dihapus karena kita pakai fitBounds

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  maxZoom:20
}).addTo(map);

var markers = [];

fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vQAmVPDHmQinF7vfKARvQ-cessl32qBxNc-Wl7hULAiZgX7sUIb0smES2hBBQqxz4ulQh-7bbtsGmd1/pub?output=csv")
.then(res => res.text())
.then(csv => {
  let rows = csv.split("\n").slice(1); // skip header

  rows.forEach(r => {
    if(r.trim() === "") return; // skip baris kosong

    // split CSV aman untuk nama dengan koma
    let col = r.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
    if(!col || col.length < 4) return;

    let rumah = col[0].replace(/"/g,'');
    let penghuni = col[1].replace(/"/g,'');
    let lat = parseFloat(col[2]);
    let lng = parseFloat(col[3]);

    if(!isNaN(lat) && !isNaN(lng)){
      let marker = L.marker([lat,lng])
        .addTo(map)
        .bindPopup("<b>Rumah "+rumah+"</b><br>Penghuni: "+penghuni);
      markers.push(marker);
    }
  });

  // zoom otomatis ke semua marker
  if(markers.length > 0){
    var group = new L.featureGroup(markers);
    map.fitBounds(group.getBounds());
  }

});
</script>
  
</body>
</html>
